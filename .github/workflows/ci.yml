name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install (reproducible)
        run: pnpm install --frozen-lockfile

      # 품질 게이트: format·lint·typecheck·데이터 무결성·test
      - name: Quality gate
        run: pnpm check

      # 클린 환경에서 빌드 재현성 확인
      - name: Build
        run: pnpm -r build
